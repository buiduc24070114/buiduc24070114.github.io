<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Create product list with CSS3</title>

    <style>
        .ProductDetails {
            display: none;
        }

        .Product img {
            width: 150px;
            height: 150px;
            border-radius: 20px;
            box-shadow: 5px 5px 10px #aaa;
        }

        .ProductName {
            font-weight: bold;
        }

        .ProductPrice {
            font-style: italic;
        }

        .ProductPrice:before {
            content: " - ";
        }

        .Product {
            text-align: center;
            width: 150px;
            margin: 0px 20px;
            float: left;
            cursor: pointer;
        }

        .Product:hover .ProductDetails {
            display: block;
        }
    </style>
</head>

<body>

    <div class="Product">
        <img src="rose.jpg">
        <div class="ProductDetails">
            <div class="ProductName">Rose</div>
            <div class="ProductPrice">1.5$</div>
        </div>
    </div>

    <div class="Product">
        <img src="tulip.jpg">
        <div class="ProductDetails">
            <div class="ProductName">Tulip</div>
            <div class="ProductPrice">2$</div>
        </div>
    </div>

    <div class="Product">
        <img src="daisy.jpg">
        <div class="ProductDetails">
            <div class="ProductName">Daisy</div>
            <div class="ProductPrice">1$</div>
        </div>
    </div>

</body>
</html>
